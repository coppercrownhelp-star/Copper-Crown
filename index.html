<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copper Crown Links</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Profile Container */
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        /* Profile Header */
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #38bdf8;
            margin-bottom: 16px;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .bio {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Links Stack */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .links-wrapper a {
            display: block;
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.07);
            color: #f8fafc;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Hover & Tap Effects */
        .links-wrapper a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
            border-color: transparent;
        }

        .links-wrapper a:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Picture -->
        <img class="profile-img" src="Black and White Minimalist Interior Design Business Card (3).png" alt="Copper Crown Logo">
        
        <!-- Identity -->
        <h1 class="name">Copper Crown</h1>
        <p class="bio">Welcome to my profile! Connect with me on my official channels below.</p>
        
        <!-- Live Links -->
        <div class="links-wrapper">
            <a href="https://www.instagram.com/copper._.crown?igsh=MXpnczZ1MzdkMWcw" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@copper._.crown?_r=1&_t=ZS-97LBs5ADTzs" target="_blank">TikTok</a>
            <a href="https://www.facebook.com/share/1DC4Jkjm2F/" target="_blank">Facebook</a>
            <a href="https://wa.me/923294942684" target="_blank">Contact us</a>
        </div>
    </div>

</body>
</html>
